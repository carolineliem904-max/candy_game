<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1/user-scalable=no stop double-tap-to-zoom and pinch-zoom
         from fighting the game's own touch input (Checkpoint 2); viewport-fit=cover
         lets the page reach behind an iPhone notch/home-indicator safe area. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Beep Beep!</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%97%3C/text%3E%3C/svg%3E" />
    <!-- iOS ignores the web manifest's icons/display-mode for "Add to Home
         Screen" and needs its own tags (Checkpoint 3): apple-touch-icon for
         the home-screen icon, apple-mobile-web-app-capable to launch
         full-screen (no Safari chrome) instead of opening a browser tab. -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Beep Beep!" />
    <meta name="theme-color" content="#8ecbe8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #8ecbe8 0%, #cdeef8 60%, #eaf8ee 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: sans-serif;
        /* No scrollable content on this page by design, so there's nothing
           to rubber-band/pull-to-refresh — these two properties just stop
           iOS/Android from *trying* the gesture at all, which otherwise
           visibly tugs the whole page during a fast swipe-swap near an edge. */
        overscroll-behavior: none;
        touch-action: none;
      }
      h1 {
        margin: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #ff6b4a;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 0.01em;
        -webkit-text-stroke: 3px #ffffff;
        paint-order: stroke fill;
        text-shadow: 0 4px 0 rgba(61, 43, 31, 0.2), 0 8px 14px rgba(61, 43, 31, 0.25);
      }
      h1 .logo-car {
        font-size: 30px;
        -webkit-text-stroke: 0;
        text-shadow: 0 3px 6px rgba(61, 43, 31, 0.3);
      }
      #app {
        width: 100%;
        max-width: 100vw;
        touch-action: none;
      }
      #app canvas {
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <h1><span class="logo-car">🚗</span> Beep Beep!</h1>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
