<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beep Beep!</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%97%3C/text%3E%3C/svg%3E" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #8ecbe8 0%, #cdeef8 60%, #eaf8ee 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: sans-serif;
      }
      h1 {
        margin: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #ff6b4a;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 0.01em;
        -webkit-text-stroke: 3px #ffffff;
        paint-order: stroke fill;
        text-shadow: 0 4px 0 rgba(61, 43, 31, 0.2), 0 8px 14px rgba(61, 43, 31, 0.25);
      }
      h1 .logo-car {
        font-size: 30px;
        -webkit-text-stroke: 0;
        text-shadow: 0 3px 6px rgba(61, 43, 31, 0.3);
      }
      #app {
        width: 100%;
        max-width: 480px;
      }
    </style>
  </head>
  <body>
    <h1><span class="logo-car">🚗</span> Beep Beep!</h1>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
